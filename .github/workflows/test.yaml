name: Test Chart

on:
  push:

jobs:
  test-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start k3s
        run: |
          cd tests/
          docker compose up -d
          for i in {1..40}; do
            if docker compose exec -T k3s kubectl get nodes >/dev/null 2>&1; then
              echo "k3s is ready"
              break
            fi
            echo "waiting for k3s..."
            sleep 5
          done

      - name: Set kubeconfig
        run: echo "KUBECONFIG=$PWD/tests/output/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Get nodes
        run: kubectl get nodes

      - name: Enable Gateway API provider on bundled Traefik
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: helm.cattle.io/v1
          kind: HelmChartConfig
          metadata:
            name: traefik
            namespace: kube-system
          spec:
            valuesContent: |-
              providers:
                kubernetesGateway:
                  enabled: true
              gateway:
                enabled: false
              gatewayClass:
                enabled: true
              rbac:
                namespaced: false
          EOF

          # helm-controller reconciles the HelmChartConfig and re-runs helm upgrade
          for i in {1..60}; do
            if kubectl get gatewayclass traefik >/dev/null 2>&1; then
              echo "GatewayClass traefik exists"
              break
            fi
            echo "waiting for GatewayClass traefik..."
            sleep 5
          done

          kubectl rollout status -n kube-system deployment/traefik --timeout=180s

          for i in {1..30}; do
            if [ "$(kubectl get gatewayclass traefik -o jsonpath='{.status.conditions[?(@.type=="Accepted")].status}' 2>/dev/null)" = "True" ]; then
              echo "GatewayClass traefik accepted"
              break
            fi
            echo "waiting for GatewayClass traefik to be accepted..."
            sleep 5
          done

      - name: Install Helm and Sops
        uses: alexellis/arkade-get@master
        with:
          helm: v3.12.3
          sops: v3.7.3

      - name: Setup helm secrets plugin
        run: helm plugin install https://github.com/jkroepke/helm-secrets --version v4.6.5

      - name: Setup Skaffold
        run: |
          wget https://storage.googleapis.com/skaffold/releases/${VERSION}/${BINARY} -O ./skaffold
          chmod +x ./skaffold
        env:
          VERSION: v2.6.0
          BINARY: skaffold-linux-amd64

      - name: Create shared Gateway for HTTPRoute tests
        run: |
          kubectl create namespace dhis2 --dry-run=client -o yaml | kubectl apply -f -
          cat <<'EOF' | kubectl apply -f -
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: dhis2-gateway
            namespace: dhis2
          spec:
            gatewayClassName: traefik
            listeners:
              - name: http
                protocol: HTTP
                port: 8000
                allowedRoutes:
                  namespaces:
                    from: Same
          EOF

      - name: Deploy DHIS2 with Gateway API
        run: |
          cd tests/gateway/
          ./../../skaffold run --status-check --wait-for-deletions

      - name: Deploy DHIS2 with FS
        run: |
          cd tests/fs/
          ./../../skaffold run --status-check --wait-for-deletions

      - name: Deploy DHIS2 with MinIO
        run: |
          cd tests/minio/
          ./../../skaffold run --status-check --wait-for-deletions

      - name: Deploy DHIS2 with S3
        run: |
          echo TODO!

      - name: Verify endpoints
        env:
          ENDPOINTS: "http://dhis2-127-0-0-1.nip.io/gateway http://dhis2-127-0-0-1.nip.io/fs http://dhis2-127-0-0-1.nip.io/minio"
        run: |
          for url in $ENDPOINTS; do
            echo "🔍 Checking $url"
            success=false
            for i in {1..30}; do
              if curl --verbose --silent --fail --location "$url" > /dev/null; then
                echo "✅ $url is reachable"
                success=true
                break
              fi
              echo "waiting for $url..."
              sleep 5
            done
          
            if [ "$success" = false ]; then
              echo "❌ $url did not respond"
              exit 1
            fi
          done

      - name: Show pods
        run: kubectl get pods -o wide --all-namespaces
