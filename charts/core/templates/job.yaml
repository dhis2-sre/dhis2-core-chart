---

{{- if .Values.jobs.installApps.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "dhis2-core-helm.fullname" . }}-install-apps"
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    #"helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
        - name: {{ include "dhis2-core-helm.fullname" . }}-install-apps-job
          image: alpine/k8s:1.29.0
          env:
            - name: SERVICE_URL
              value: "http://{{ include "dhis2-core-helm.fullname" . }}:{{ .Values.service.port }}{{ .Values.ingress.path }}"
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "dhis2-core-helm.fullname" . }}
                  key: USERNAME
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dhis2-core-helm.fullname" . }}
                  key: PASSWORD
            - name: APPS
              value: {{ .Values.jobs.installApps.apps | toJson | quote }}
          command:
            - /bin/sh
            - -c
            - |
              {{- .Files.Get "scripts/install-apps.sh" | nindent 15 }}
      restartPolicy: OnFailure
{{- end }}

---

{{- if .Values.doris.createDatabase }}
{{- if not .Values.doris.database }}
{{- fail "doris.database is required when createDatabase is true" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "dhis2-core-helm.fullname" . }}-create-database"
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-database
          image: mysql:8.0
          command:
            - mysql
            - -h
            - {{ .Values.doris.hostname }}
            - -P
            - {{ .Values.doris.port | quote }}
            - -uroot
            - -e
            - "CREATE DATABASE IF NOT EXISTS {{ .Values.doris.database }}"
{{- end }}
